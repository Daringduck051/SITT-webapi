<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link href="SITT_Style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-light bg-light navBar">
        <div class="container-fluid navBar">
            <h1 class="navbar-text mx-auto">
                Support - Sign In
            </h1>
        </div>
    </nav>

    <div id="agentDialog" class="authDialog">
        <form id="agentConfirm" class="authBox" autocomplete="off" autocapitalize="off" data-bs-keyboard="false">
            <!-- <button type="button" onclick="signIn()">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-microsoft" viewBox="0 0 16 16">
                    <path d="M7.462 0H0v7.19h7.462zM16 0H8.538v7.19H16zM7.462 8.211H0V16h7.462zm8.538 0H8.538V16H16z"/>
                </svg> Login with Microsoft
            </button>
            <h6></h6> -->
            <input type="text" id="agentId" placeholder="Username" maxlength="20" required>
            <h6></h6>
            <input type="password" id="agentPass" placeholder="Password" required>
            <svg id="showPass" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eye" viewBox="0 0 16 16">
                <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
                <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
            </svg>
            <h6></h6>
            <button type="submit" id="agentSubmit" value="confirm">Login</button>
            <h6 id="loginError" class="Error" hidden>Invalid username or password</h6>
            <h6></h6>
            <a id="createAccount" href="Register.html">Don't have account? Create one</a>
            <h6></h6>
            <a id="forgotAccount" href="#">Forgot Username or Password?</a>
        </form>
    </div>

    <dialog id="forgotDialog1">
        <form method="dialog" id="forgotPass" autocomplete="off" data-bs-keyboard="false">
            <h2>Account Recovery</h2>
            <h6></h6>
            <h3>Enter username:</h3>
            <h6></h6>
            <input type="text" id="confirmEmail" placeholder="Username" required>
            <h6></h6>
            <button type="submit" id="tryEmail" value="confirm">Continue</button>
            <button type="button" id="emailClose" value="close">Cancel</button>
        </form>
    </dialog>

    <dialog id="forgotDialog2">
        <form method="dialog" id="enterCode" autocomplete="off" data-bs-keyboard="false">
            <h2>Account Recovery</h2>
            <h6></h6>
            <h3>If account exists, an email has been sent to your email with instructions on how to reset your password</h3>
            <h3>Link will expire in 10 minutes</h3>
            <h6></h6>
            <button type="button" id="cancelCode" value="close">Close</button>
        </form>
    </dialog>
    <script src="Authenticate.js" defer></script>
    <script src="Forgot.js" defer></script>
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
</body>
</html>
